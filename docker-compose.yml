services:
  postgres:
    image: postgres:16-alpine
    container_name: daily-speaking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: daily_speaking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d daily_speaking"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
