services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: daily-speaking-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/daily_speaking
      SERVER_LOG_LEVEL: info
      UPLOADS_DIR: ${UPLOADS_DIR:-/app/uploads}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:31b-cloud}
      OLLAMA_THINKING_MODEL: ${OLLAMA_THINKING_MODEL:-true}
      WHISPER_BACKEND: ${WHISPER_BACKEND:-openai}
      WHISPER_BINARY_PATH: ${WHISPER_BINARY_PATH:-}
      WHISPER_MODEL_PATH: ${WHISPER_MODEL_PATH:-}
      WHISPER_PYTHON_BIN: ${WHISPER_PYTHON_BIN:-/opt/whisper/bin/python}
      WHISPER_OPENAI_MODEL: ${WHISPER_OPENAI_MODEL:-base.en}
      WHISPER_OPENAI_MODEL_DIR: ${WHISPER_OPENAI_MODEL_DIR:-/app/tools/whisper/openai-models}
      WHISPER_OPENAI_CACHE_DIR: ${WHISPER_OPENAI_CACHE_DIR:-/app/tools/whisper/cache}
      WHISPER_FFMPEG_BIN: ${WHISPER_FFMPEG_BIN:-/usr/bin/ffmpeg}
      WHISPER_OPENAI_DEVICE: ${WHISPER_OPENAI_DEVICE:-cpu}
      WHISPER_OPENAI_FP16: ${WHISPER_OPENAI_FP16:-false}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-en}
    ports:
      - "0.0.0.0:${APP_PORT:-3218}:3000"
    volumes:
      - ./tools:/app/tools
      - ${UPLOADS_HOST_DIR:-./.data/uploads}:/app/uploads

  lan-https:
    image: caddy:2-alpine
    container_name: daily-speaking-lan-https
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "0.0.0.0:${HTTPS_PORT:-3443}:3443"
    volumes:
      - ./lan-https/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./lan-https/certs:/certs:ro

  postgres:
    image: postgres:16-alpine
    container_name: daily-speaking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: daily_speaking
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d daily_speaking"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
