services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: daily-speaking-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/daily_speaking
      SERVER_LOG_LEVEL: info
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:31b-cloud}
      OLLAMA_THINKING_MODEL: ${OLLAMA_THINKING_MODEL:-true}
      WHISPER_BACKEND: ${WHISPER_BACKEND:-auto}
      WHISPER_BINARY_PATH: ${WHISPER_BINARY_PATH:-}
      WHISPER_MODEL_PATH: ${WHISPER_MODEL_PATH:-}
      WHISPER_PYTHON_BIN: ${WHISPER_PYTHON_BIN:-}
      WHISPER_OPENAI_MODEL: ${WHISPER_OPENAI_MODEL:-base.en}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-en}
    ports:
      - "0.0.0.0:${APP_PORT:-3218}:3000"
    volumes:
      - ./tools:/app/tools
      - ./public/uploads:/app/public/uploads

  postgres:
    image: postgres:16-alpine
    container_name: daily-speaking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: daily_speaking
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d daily_speaking"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
