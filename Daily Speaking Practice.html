<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Speaking Practice</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fafaf8;
            color: #2c2c2c;
            line-height: 1.6;
        }

        .app-container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: white;
            border-bottom: 1px solid #e8e8e4;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex;
            gap: 32px;
            padding: 0;
            list-style: none;
        }

        .nav-tabs li {
            position: relative;
        }

        .nav-tabs button {
            background: none;
            border: none;
            padding: 12px 0;
            font-size: 14px;
            font-weight: 500;
            color: #888;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-tabs button:hover {
            color: #2c2c2c;
        }

        .nav-tabs button.active {
            color: #2c2c2c;
            font-weight: 600;
        }

        .nav-tabs button.active::after {
            content: '';
            position: absolute;
            bottom: -16px;
            left: 0;
            right: 0;
            height: 2px;
            background: #2c2c2c;
        }

        /* Main content */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px 24px;
            max-width: 700px;
            margin: 0 auto;
            width: 100%;
        }

        /* Screen visibility */
        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* Buttons */
        button {
            font-family: inherit;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .btn-primary {
            background: #2c2c2c;
            color: white;
        }

        .btn-primary:hover {
            background: #1a1a1a;
        }

        .btn-secondary {
            background: white;
            color: #2c2c2c;
            border: 1px solid #e8e8e4;
        }

        .btn-secondary:hover {
            background: #f5f5f3;
        }

        .btn-large {
            padding: 16px 32px;
            font-size: 16px;
            width: 100%;
            margin-bottom: 24px;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 13px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn-group .btn {
            flex: 1;
        }

        /* Topics */
        .topics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin: 32px 0;
        }

        .topic-btn {
            padding: 16px;
            background: white;
            border: 1px solid #e8e8e4;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            font-size: 13px;
            transition: all 0.2s;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .topic-btn:hover {
            border-color: #d0d0c8;
            background: #f5f5f3;
        }

        .topic-btn.selected {
            background: #2c2c2c;
            color: white;
            border-color: #2c2c2c;
        }

        /* Sections */
        .section {
            margin-bottom: 32px;
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .section-content {
            background: white;
            border: 1px solid #e8e8e4;
            border-radius: 8px;
            padding: 20px;
        }

        .collapsible-section {
            margin-bottom: 16px;
        }

        .collapsible-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            padding: 12px 0;
            border: none;
            background: none;
            width: 100%;
            font-weight: 500;
            text-align: left;
        }

        .collapsible-header:hover {
            color: #1a1a1a;
        }

        .collapsible-content {
            display: none;
            padding-top: 12px;
            padding-left: 0;
        }

        .collapsible-content.open {
            display: block;
        }

        .toggle-arrow {
            transition: transform 0.2s;
        }

        .toggle-arrow.open {
            transform: rotate(180deg);
        }

        /* Questions & Words */
        .question-item, .word-item {
            margin-bottom: 12px;
            padding: 12px;
            background: #f5f5f3;
            border-radius: 6px;
            font-size: 13px;
            line-height: 1.5;
        }

        .question-item:last-child, .word-item:last-child {
            margin-bottom: 0;
        }

        /* Timer */
        .timer {
            font-size: 48px;
            font-weight: 300;
            text-align: center;
            margin: 40px 0;
            font-family: 'Monaco', 'Courier New', monospace;
            letter-spacing: 2px;
        }

        /* Recording state indicator */
        .recording-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .recording-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #dc3545;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* History */
        .calendar-wrapper {
            margin-bottom: 24px;
        }

        .calendar {
            background: white;
            border: 1px solid #e8e8e4;
            border-radius: 8px;
            padding: 16px;
            display: none;
        }

        .calendar.visible {
            display: block;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .calendar-header h3 {
            font-size: 14px;
            font-weight: 600;
        }

        .calendar-header button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            border-radius: 6px;
            background: white;
            border: 1px solid #e8e8e4;
            transition: all 0.2s;
            position: relative;
        }

        .calendar-day:hover {
            background: #f5f5f3;
        }

        .calendar-day.other-month {
            color: #ccc;
        }

        .calendar-day.has-recordings {
            font-weight: 600;
        }

        .calendar-day.has-recordings::after {
            content: '';
            position: absolute;
            bottom: 2px;
            width: 4px;
            height: 4px;
            background: #2c2c2c;
            border-radius: 50%;
        }

        .calendar-day.selected {
            background: #2c2c2c;
            color: white;
            border-color: #2c2c2c;
        }

        /* Recording cards */
        .recording-card {
            background: white;
            border: 1px solid #e8e8e4;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .recording-card:hover {
            border-color: #d0d0c8;
            background: #f5f5f3;
        }

        .recording-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .recording-time {
            font-weight: 500;
            font-size: 13px;
        }

        .recording-duration {
            font-size: 12px;
            color: #888;
        }

        .recording-topic {
            font-size: 13px;
            color: #666;
        }

        /* Details screen */
        .details-metadata {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid #e8e8e4;
            font-size: 13px;
            color: #888;
        }

        .player {
            background: white;
            border: 1px solid #e8e8e4;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .play-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #2c2c2c;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn:hover {
            background: #1a1a1a;
        }

        .progress-bar {
            flex: 1;
            height: 4px;
            background: #e8e8e4;
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            background: #2c2c2c;
            border-radius: 2px;
            width: 0%;
        }

        .time-display {
            font-size: 12px;
            color: #888;
            min-width: 40px;
        }

        /* Transcript & Suggestions */
        .transcript-section, .suggestions-section {
            margin-bottom: 32px;
        }

        .transcript-text {
            background: #f5f5f3;
            padding: 16px;
            border-radius: 8px;
            line-height: 1.6;
            font-size: 14px;
        }

        .suggestion-item {
            background: white;
            border: 1px solid #e8e8e4;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .suggestion-wrong {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 13px;
            line-height: 1.5;
        }

        .suggestion-wrong-icon {
            color: #dc3545;
            font-weight: 600;
            min-width: 20px;
        }

        .suggestion-right {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 13px;
            line-height: 1.5;
        }

        .suggestion-right-icon {
            color: #28a745;
            font-weight: 600;
            min-width: 20px;
        }

        .suggestion-explanation {
            font-size: 12px;
            color: #888;
            line-height: 1.5;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #e8e8e4;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.visible {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 32px;
            max-width: 400px;
            width: 90%;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e8e8e4;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            font-family: inherit;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        .modal-buttons .btn {
            flex: 1;
        }

        /* Share modal */
        .share-option {
            padding: 16px;
            border: 1px solid #e8e8e4;
            border-radius: 8px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .share-option:hover {
            background: #f5f5f3;
        }

        .share-option label {
            display: flex;
            align-items: center;
            cursor: pointer;
            gap: 12px;
        }

        .share-option input[type="radio"] {
            cursor: pointer;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px 24px;
            color: #888;
            font-size: 14px;
        }

        /* Back button */
        .back-btn {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 24px;
            padding: 0;
        }

        .back-btn:hover {
            color: #2c2c2c;
        }

        /* Add topic input */
        .add-topic-input {
            display: none;
            margin: 16px 0;
        }

        .add-topic-input.visible {
            display: block;
        }

        .add-topic-input input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e8e8e4;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 12px;
            font-family: inherit;
        }

        .topic-input-buttons {
            display: flex;
            gap: 12px;
        }

        .topic-input-buttons .btn {
            flex: 1;
        }

        /* Ready to record state heading */
        .heading-xl {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 32px;
        }

        .heading-sm {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 400;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>Daily Speaking</h1>
            <ul class="nav-tabs">
                <li><button class="nav-btn active" data-screen="speak">Speak</button></li>
                <li><button class="nav-btn" data-screen="history">History</button></li>
            </ul>
        </div>

        <div class="main-content">
            <!-- Screen A: Speak -->
            <div id="speak" class="screen active">
                <div id="speak-content"></div>
            </div>

            <!-- Screen B: History -->
            <div id="history" class="screen">
                <button class="back-btn" style="display:none;">← Back</button>
                <h2>History</h2>
                <div class="calendar-wrapper">
                    <button class="btn btn-secondary btn-small" id="toggle-calendar">📅 Select date</button>
                    <div class="calendar" id="calendar"></div>
                </div>
                <div id="history-list"></div>
            </div>

            <!-- Screen C: Recording Details -->
            <div id="details" class="screen">
                <button class="back-btn">← Back</button>
                <h2>Recording</h2>
                <div id="details-content"></div>
            </div>

            <!-- Screen D: Share Preview -->
            <div id="share" class="screen">
                <button class="back-btn">← Back</button>
                <h2>Shared Recording</h2>
                <div id="share-content"></div>
            </div>
        </div>
    </div>

    <!-- Share Modal -->
    <div class="modal" id="shareModal">
        <div class="modal-content">
            <div class="modal-title">Share Recording</div>
            <div class="share-option">
                <label>
                    <input type="radio" name="share-action" value="copy" checked>
                    <span>Copy link</span>
                </label>
            </div>
            <div class="share-option">
                <label>
                    <input type="radio" name="share-action" value="preview">
                    <span>Open share preview</span>
                </label>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" id="cancelShare">Cancel</button>
                <button class="btn btn-primary" id="confirmShare">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        // App State
        const appState = {
            currentScreen: 'speak',
            speakState: 'idle', // idle, readyToRecord, recording, recorded
            selectedTopic: null,
            selectedQuestions: false,
            selectedWords: false,
            recordingDuration: 0,
            recordingTimer: null,
            recordings: [],
            selectedDate: null,
            currentRecordingId: null,
            isPlaying: false,
            playbackPosition: 0,
            selectedRecording: null,
            topics: [
                'My morning routine',
                'Favorite hobby',
                'Learning English'
            ]
        };

        const getTopicData = (topic) => {
            const topicDatabase = {
                'Free talk': {
                    questions: [],
                    words: []
                },
                'My morning routine': {
                    questions: [
                        'What time do you usually wake up?',
                        'What is the first thing you do?',
                        'How do you feel in the morning?',
                        'What do you have for breakfast?'
                    ],
                    words: ['alarm', 'routine', 'energize', 'habit', 'refresh', 'prepare', 'morning']
                },
                'Favorite hobby': {
                    questions: [
                        'When did you start this hobby?',
                        'Why do you enjoy it?',
                        'How often do you do it?',
                        'Do you do it alone or with others?'
                    ],
                    words: ['passion', 'hobby', 'practice', 'skill', 'enjoy', 'hobby', 'favorite']
                },
                'Learning English': {
                    questions: [
                        'How long have you been learning?',
                        'What methods work best for you?',
                        'What challenges do you face?',
                        'What are your goals?'
                    ],
                    words: ['progress', 'challenge', 'fluent', 'improve', 'practice', 'language', 'goal']
                }
            };

            return topicDatabase[topic] || { questions: [], words: [] };
        };

        const generateTranscript = (topic) => {
            const samples = {
                'Free talk': 'Today I want to talk about something I have been thinking about lately. I think it\'s important to take time every day to reflect on our progress and what we\'ve learned. Speaking freely like this helps us practice naturally without worrying too much about making mistakes.',
                'My morning routine': 'I usually wake up at 6:30 AM. The first thing I do is drink a glass of water to hydrate myself. Then I do some light exercise or stretching for about 15 minutes. After that, I take a shower and have breakfast with tea. This routine helps me feel energized for the day.',
                'Favorite hobby': 'My favorite hobby is reading. I enjoy reading books in different genres, especially science fiction and mystery novels. I try to read for at least 30 minutes every day before bed. It helps me relax and expand my vocabulary at the same time. I have been reading since I was a child.',
                'Learning English': 'I\'ve been learning English for about 5 years now. At first, I struggled with speaking, but I found that practicing daily conversations has helped me improve significantly. The biggest challenge is understanding native speakers when they talk fast. My goal is to reach a fluent level where I can express complex ideas effortlessly.'
            };

            return samples[topic] || 'This is a sample transcript of a speaking practice session.';
        };

        const generateSuggestions = (topic) => {
            return [
                {
                    wrong: 'I think it\'s important to taking time',
                    right: 'I think it\'s important to take time',
                    explanation: 'After "to" use the base form of the verb, not the gerund.'
                },
                {
                    wrong: 'help us practice naturally without worry about mistakes',
                    right: 'help us practice naturally without worrying about mistakes',
                    explanation: 'Use the gerund form (worrying) after the preposition "without".'
                },
                {
                    wrong: 'I am reading since I was a child',
                    right: 'I have been reading since I was a child',
                    explanation: 'Use present perfect continuous for actions that started in the past and continue now.'
                },
                {
                    wrong: 'it helps me relax and expand the vocabulary',
                    right: 'it helps me relax and expand my vocabulary',
                    explanation: 'Use the possessive pronoun "my" instead of "the" in this context.'
                }
            ];
        };

        const refreshTopics = () => {
            const allTopics = [
                'My morning routine',
                'Favorite hobby',
                'Learning English',
                'Dream vacation',
                'Best friend',
                'Career goals'
            ];
            appState.topics = allTopics.sort(() => Math.random() - 0.5).slice(0, 3);
            renderSpeak();
        };

        const startRecording = () => {
            appState.speakState = 'recording';
            appState.recordingDuration = 0;
            clearInterval(appState.recordingTimer);
            appState.recordingTimer = setInterval(() => {
                appState.recordingDuration++;
                renderSpeak();
            }, 1000);
            renderSpeak();
        };

        const stopRecording = () => {
            clearInterval(appState.recordingTimer);
            appState.speakState = 'recorded';
            renderSpeak();
        };

        const saveRecording = () => {
            const recordingId = Date.now();
            const recording = {
                id: recordingId,
                topic: appState.selectedTopic || 'Free talk',
                duration: appState.recordingDuration,
                timestamp: new Date(),
                transcript: generateTranscript(appState.selectedTopic || 'Free talk'),
                suggestions: generateSuggestions(appState.selectedTopic || 'Free talk')
            };
            appState.recordings = [...appState.recordings, recording];
            appState.currentRecordingId = recordingId;
            appState.selectedDate = new Date().toISOString().split('T')[0];
            appState.speakState = 'idle';
            appState.selectedTopic = null;
            appState.selectedQuestions = false;
            appState.selectedWords = false;
            showScreen('details');
            renderDetails(recordingId);
        };

        const reRecord = () => {
            appState.recordingDuration = 0;
            if (appState.selectedTopic) {
                appState.speakState = 'readyToRecord';
            } else {
                appState.speakState = 'idle';
            }
            renderSpeak();
        };

        const selectTopic = (topic) => {
            appState.selectedTopic = topic;
            appState.speakState = 'readyToRecord';
            appState.selectedQuestions = false;
            appState.selectedWords = false;
            renderSpeak();
        };

        const toggleQuestions = () => {
            appState.selectedQuestions = !appState.selectedQuestions;
            renderSpeak();
        };

        const toggleWords = () => {
            appState.selectedWords = !appState.selectedWords;
            renderSpeak();
        };

        const toggleAddTopic = () => {
            const input = document.getElementById('addTopicInput');
            if (input) {
                input.classList.toggle('visible');
            }
        };

        const useCustomTopic = () => {
            const input = document.getElementById('customTopicInput');
            if (input && input.value.trim()) {
                selectTopic(input.value.trim());
                input.value = '';
                document.getElementById('addTopicInput').classList.remove('visible');
            }
        };

        const formatTime = (seconds) => {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        };

        const renderSpeak = () => {
            const content = document.getElementById('speak-content');
            const state = appState.speakState;

            if (state === 'idle') {
                content.innerHTML = `
                    <button class="btn btn-primary btn-large" onclick="appState.speakState='recording'; appState.selectedTopic=null; appState.selectedQuestions=false; startRecording();">Start speaking</button>
                    
                    <div class="section">
                        <div class="section-title">Today's topics</div>
                        <div class="topics-grid">
                            ${appState.topics.map(topic => `
                                <button class="topic-btn" onclick="selectTopic('${topic}');">${topic}</button>
                            `).join('')}
                        </div>
                        <button class="btn btn-secondary btn-small" onclick="refreshTopics();">↻ Refresh topics</button>
                    </div>

                    <div class="section">
                        <button class="btn btn-secondary btn-small" onclick="toggleAddTopic();">+ Add your own topic</button>
                        <div class="add-topic-input" id="addTopicInput">
                            <input type="text" id="customTopicInput" placeholder="Write your topic…">
                            <div class="topic-input-buttons">
                                <button class="btn btn-secondary" onclick="toggleAddTopic();">Cancel</button>
                                <button class="btn btn-primary" onclick="useCustomTopic();">Use this topic</button>
                            </div>
                        </div>
                    </div>
                `;
            } else if (state === 'readyToRecord') {
                const topicData = getTopicData(appState.selectedTopic);
                content.innerHTML = `
                    <div class="heading-sm">Selected topic</div>
                    <h2 class="heading-xl">${appState.selectedTopic}</h2>
                    
                    <button class="btn btn-primary btn-large" onclick="startRecording();">Start speaking</button>

                    ${topicData.questions.length > 0 ? `
                        <div class="collapsible-section">
                            <button class="collapsible-header" onclick="toggleQuestions(); renderSpeak();">
                                <span>Show questions</span>
                                <span class="toggle-arrow ${appState.selectedQuestions ? 'open' : ''}">↓</span>
                            </button>
                            <div class="collapsible-content ${appState.selectedQuestions ? 'open' : ''}">
                                ${topicData.questions.map(q => `<div class="question-item">${q}</div>`).join('')}
                            </div>
                        </div>
                    ` : ''}

                    ${topicData.words.length > 0 ? `
                        <div class="collapsible-section">
                            <button class="collapsible-header" onclick="toggleWords(); renderSpeak();">
                                <span>Useful words (optional)</span>
                                <span class="toggle-arrow ${appState.selectedWords ? 'open' : ''}">↓</span>
                            </button>
                            <div class="collapsible-content ${appState.selectedWords ? 'open' : ''}">
                                ${topicData.words.map(w => `<div class="word-item">${w}</div>`).join('')}
                            </div>
                        </div>
                    ` : ''}
                `;
            } else if (state === 'recording') {
                const topicData = appState.selectedTopic ? getTopicData(appState.selectedTopic) : { questions: [] };
                const showQuestions = appState.selectedQuestions && topicData.questions.length > 0;
                
                content.innerHTML = `
                    <div class="recording-indicator">
                        <div class="recording-dot"></div>
                        <span>${appState.selectedTopic || 'Free talk'}</span>
                    </div>

                    <div class="timer">${formatTime(appState.recordingDuration)}</div>

                    ${showQuestions ? `
                        <div class="section">
                            <div class="section-title">Questions</div>
                            <div class="section-content">
                                ${topicData.questions.map(q => `<div class="question-item">${q}</div>`).join('')}
                            </div>
                        </div>
                    ` : ''}

                    <button class="btn btn-primary btn-large" onclick="stopRecording();">Stop</button>
                `;
            } else if (state === 'recorded') {
                content.innerHTML = `
                    <div style="text-align: center; margin-bottom: 32px;">
                        <div style="font-size: 24px; font-weight: 600; margin-bottom: 8px;">Recording saved</div>
                        <div style="color: #888; font-size: 14px;">Duration: ${formatTime(appState.recordingDuration)}</div>
                    </div>

                    <div class="btn-group">
                        <button class="btn btn-secondary" onclick="reRecord();">Re-record</button>
                        <button class="btn btn-primary" onclick="saveRecording();">Save & continue</button>
                    </div>
                `;
            }
        };

        const renderHistory = () => {
            const content = document.getElementById('history-list');
            const calendar = document.getElementById('calendar');

            // Calendar
            const today = new Date();
            const currentMonth = today.getMonth();
            const currentYear = today.getFullYear();
            
            const firstDay = new Date(currentYear, currentMonth, 1);
            const lastDay = new Date(currentYear, currentMonth + 1, 0);
            const daysInMonth = lastDay.getDate();
            const startingDayOfWeek = firstDay.getDay();

            let calendarHTML = `
                <div class="calendar-header">
                    <button onclick="previousMonth();">←</button>
                    <h3>${firstDay.toLocaleString('default', { month: 'long', year: 'numeric' })}</h3>
                    <button onclick="nextMonth();">→</button>
                </div>
                <div class="calendar-grid">
                    <div style="color: #888; font-size: 12px;">Sun</div>
                    <div style="color: #888; font-size: 12px;">Mon</div>
                    <div style="color: #888; font-size: 12px;">Tue</div>
                    <div style="color: #888; font-size: 12px;">Wed</div>
                    <div style="color: #888; font-size: 12px;">Thu</div>
                    <div style="color: #888; font-size: 12px;">Fri</div>
                    <div style="color: #888; font-size: 12px;">Sat</div>
            `;

            for (let i = 0; i < startingDayOfWeek; i++) {
                calendarHTML += '<div class="calendar-day other-month"></div>';
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(currentYear, currentMonth, day);
                const dateString = date.toISOString().split('T')[0];
                const hasRecordings = appState.recordings.some(r => 
                    r.timestamp.toISOString().split('T')[0] === dateString
                );
                const isSelected = appState.selectedDate === dateString;

                calendarHTML += `
                    <button class="calendar-day ${hasRecordings ? 'has-recordings' : ''} ${isSelected ? 'selected' : ''}" 
                            onclick="selectDate('${dateString}');">${day}</button>
                `;
            }

            calendarHTML += '</div>';
            calendar.innerHTML = calendarHTML;

            // Recording list
            const selectedDateRecordings = appState.selectedDate
                ? appState.recordings.filter(r => r.timestamp.toISOString().split('T')[0] === appState.selectedDate)
                : appState.recordings.sort((a, b) => b.timestamp - a.timestamp).slice(0, 10);

            if (selectedDateRecordings.length === 0) {
                content.innerHTML = '<div class="empty-state">No recordings on this day.</div>';
            } else {
                content.innerHTML = selectedDateRecordings
                    .sort((a, b) => b.timestamp - a.timestamp)
                    .map(recording => `
                        <div class="recording-card" onclick="showRecordingDetails(${recording.id});">
                            <div class="recording-card-header">
                                <div>
                                    <div class="recording-time">${recording.timestamp.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}</div>
                                    <div class="recording-topic">${recording.topic}</div>
                                </div>
                                <div class="recording-duration">${formatTime(recording.duration)}</div>
                            </div>
                        </div>
                    `).join('');
            }
        };

        const selectDate = (dateString) => {
            appState.selectedDate = dateString;
            renderHistory();
        };

        const previousMonth = () => {
            // Simplified: just re-render current month for demo
            renderHistory();
        };

        const nextMonth = () => {
            // Simplified: just re-render current month for demo
            renderHistory();
        };

        const showRecordingDetails = (recordingId) => {
            appState.currentRecordingId = recordingId;
            showScreen('details');
            renderDetails(recordingId);
        };

        const renderDetails = (recordingId) => {
            const recording = appState.recordings.find(r => r.id === recordingId);
            if (!recording) return;

            const content = document.getElementById('details-content');
            content.innerHTML = `
                <div class="details-metadata">
                    <div><strong>${formatTime(recording.duration)}</strong></div>
                    <div>${recording.topic}</div>
                </div>

                <div class="player">
                    <div class="player-controls">
                        <button class="play-btn" id="playBtn" onclick="togglePlayback();">▶</button>
                        <div class="progress-bar" onclick="seekAudio(event);">
                            <div class="progress-bar-fill" id="progressFill"></div>
                        </div>
                        <div class="time-display"><span id="currentTime">0:00</span> / ${formatTime(recording.duration)}</div>
                    </div>
                </div>

                <div class="transcript-section">
                    <div class="section-title">Transcript</div>
                    <div class="transcript-text">${recording.transcript}</div>
                </div>

                <div class="suggestions-section">
                    <div class="section-title">AI Suggestions</div>
                    ${recording.suggestions.map(s => `
                        <div class="suggestion-item">
                            <div class="suggestion-wrong">
                                <span class="suggestion-wrong-icon">❌</span>
                                <span>${s.wrong}</span>
                            </div>
                            <div class="suggestion-right">
                                <span class="suggestion-right-icon">✅</span>
                                <span>${s.right}</span>
                            </div>
                            <div class="suggestion-explanation">${s.explanation}</div>
                        </div>
                    `).join('')}
                </div>

                <button class="btn btn-primary btn-large" onclick="showShareModal();">Share recording</button>
            `;
        };

        const togglePlayback = () => {
            appState.isPlaying = !appState.isPlaying;
            const recording = appState.recordings.find(r => r.id === appState.currentRecordingId);
            const playBtn = document.getElementById('playBtn');
            
            if (appState.isPlaying) {
                playBtn.textContent = '⏸';
                const interval = setInterval(() => {
                    if (appState.isPlaying && appState.playbackPosition < recording.duration) {
                        appState.playbackPosition++;
                        updateProgressBar();
                    } else if (appState.playbackPosition >= recording.duration) {
                        appState.isPlaying = false;
                        appState.playbackPosition = 0;
                        playBtn.textContent = '▶';
                        clearInterval(interval);
                        updateProgressBar();
                    }
                }, 1000);
            } else {
                playBtn.textContent = '▶';
            }
        };

        const seekAudio = (event) => {
            const recording = appState.recordings.find(r => r.id === appState.currentRecordingId);
            const progressBar = event.currentTarget;
            const clickX = event.offsetX;
            const width = progressBar.offsetWidth;
            appState.playbackPosition = Math.round((clickX / width) * recording.duration);
            updateProgressBar();
        };

        const updateProgressBar = () => {
            const recording = appState.recordings.find(r => r.id === appState.currentRecordingId);
            const fill = document.getElementById('progressFill');
            const currentTime = document.getElementById('currentTime');
            
            if (fill && currentTime) {
                const percentage = (appState.playbackPosition / recording.duration) * 100;
                fill.style.width = percentage + '%';
                currentTime.textContent = formatTime(appState.playbackPosition);
            }
        };

        const showShareModal = () => {
            document.getElementById('shareModal').classList.add('visible');
        };

        const hideShareModal = () => {
            document.getElementById('shareModal').classList.remove('visible');
        };

        const confirmShare = () => {
            const action = document.querySelector('input[name="share-action"]:checked').value;
            hideShareModal();
            
            if (action === 'copy') {
                const shareLink = `${window.location.origin}${window.location.pathname}?share=${appState.currentRecordingId}`;
                alert('Link copied: ' + shareLink);
            } else if (action === 'preview') {
                showScreen('share');
                renderSharePreview(appState.currentRecordingId);
            }
        };

        const renderSharePreview = (recordingId) => {
            const recording = appState.recordings.find(r => r.id === recordingId);
            if (!recording) return;

            const content = document.getElementById('share-content');
            content.innerHTML = `
                <div class="details-metadata">
                    <div><strong>${formatTime(recording.duration)}</strong></div>
                    <div>${recording.topic}</div>
                </div>

                <div class="player">
                    <div class="player-controls">
                        <button class="play-btn">▶</button>
                        <div class="progress-bar" style="cursor: not-allowed;">
                            <div class="progress-bar-fill" style="width: 0%;"></div>
                        </div>
                        <div class="time-display">0:00 / ${formatTime(recording.duration)}</div>
                    </div>
                </div>

                <div class="transcript-section">
                    <div class="section-title">Transcript</div>
                    <div class="transcript-text">${recording.transcript}</div>
                </div>

                <div class="suggestions-section">
                    <div class="section-title">AI Suggestions</div>
                    ${recording.suggestions.map(s => `
                        <div class="suggestion-item">
                            <div class="suggestion-wrong">
                                <span class="suggestion-wrong-icon">❌</span>
                                <span>${s.wrong}</span>
                            </div>
                            <div class="suggestion-right">
                                <span class="suggestion-right-icon">✅</span>
                                <span>${s.right}</span>
                            </div>
                            <div class="suggestion-explanation">${s.explanation}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        };

        const showScreen = (screenName) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenName).classList.add('active');
            appState.currentScreen = screenName;

            // Reset playback when leaving details
            if (screenName !== 'details' && screenName !== 'share') {
                appState.isPlaying = false;
                appState.playbackPosition = 0;
            }

            // Hide back button on main screens
            const backBtn = document.querySelector('.back-btn');
            if (backBtn) {
                backBtn.style.display = screenName === 'speak' || screenName === 'history' ? 'none' : 'block';
            }
        };

        // Navigation
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const screenName = e.target.dataset.screen;
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                showScreen(screenName);
                if (screenName === 'history') {
                    renderHistory();
                } else if (screenName === 'speak') {
                    renderSpeak();
                }
            });
        });

        // Back buttons
        document.querySelectorAll('.back-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (appState.currentScreen === 'details' || appState.currentScreen === 'share') {
                    showScreen('history');
                    renderHistory();
                }
            });
        });

        // Calendar toggle
        document.getElementById('toggle-calendar').addEventListener('click', () => {
            document.getElementById('calendar').classList.toggle('visible');
        });

        // Share modal events
        document.getElementById('cancelShare').addEventListener('click', hideShareModal);
        document.getElementById('confirmShare').addEventListener('click', confirmShare);

        // Close modal on outside click
        document.getElementById('shareModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('shareModal')) {
                hideShareModal();
            }
        });

        // Initial render
        renderSpeak();
    </script>
</body>
</html>
