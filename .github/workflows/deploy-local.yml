name: Deploy Local Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

concurrency:
  group: daily-speaking-local-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, windows, daily-speaking]
    timeout-minutes: 60

    defaults:
      run:
        shell: powershell

    env:
      COMPOSE_PROJECT_NAME: daily-speaking
      APP_PORT: ${{ vars.APP_PORT || '3218' }}
      HTTPS_PORT: ${{ vars.HTTPS_PORT || '3443' }}
      POSTGRES_PORT: ${{ vars.POSTGRES_PORT || '5433' }}
      UPLOADS_HOST_DIR: ${{ vars.UPLOADS_HOST_DIR || 'D:\DailySpeaking\data\uploads' }}
      UPLOADS_DIR: /app/uploads
      OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL || 'http://host.docker.internal:11434' }}
      OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL || 'gemma4:31b-cloud' }}
      OLLAMA_THINKING_MODEL: ${{ vars.OLLAMA_THINKING_MODEL || 'true' }}
      WHISPER_BACKEND: openai
      WHISPER_BINARY_PATH: ${{ vars.WHISPER_BINARY_PATH || '' }}
      WHISPER_MODEL_PATH: ${{ vars.WHISPER_MODEL_PATH || '' }}
      WHISPER_PYTHON_BIN: /opt/whisper/bin/python
      WHISPER_OPENAI_MODEL: ${{ vars.WHISPER_OPENAI_MODEL || 'base.en' }}
      WHISPER_OPENAI_MODEL_DIR: /app/tools/whisper/openai-models
      WHISPER_OPENAI_CACHE_DIR: /app/tools/whisper/cache
      WHISPER_FFMPEG_BIN: /usr/bin/ffmpeg
      WHISPER_OPENAI_DEVICE: cpu
      WHISPER_OPENAI_FP16: false
      WHISPER_LANGUAGE: ${{ vars.WHISPER_LANGUAGE || 'en' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        run: npm ci

      - name: Quality gates
        run: npm run quality

      - name: Check Docker
        run: docker version

      - name: Build and start local Docker HTTPS app
        run: .\scripts\setup-lan-https-proxy.ps1

      - name: Wait for app health check
        run: |
          $healthUrl = "http://127.0.0.1:$env:APP_PORT/healthz"
          Write-Host "Checking $healthUrl"

          for ($attempt = 1; $attempt -le 30; $attempt++) {
            try {
              $response = Invoke-RestMethod -Uri $healthUrl -TimeoutSec 2
              if ($response.ok -eq $true) {
                Write-Host "App is healthy."
                exit 0
              }
            } catch {
              Write-Host "Health check attempt $attempt failed: $($_.Exception.Message)"
            }

            Start-Sleep -Seconds 2
          }

          docker compose ps
          docker compose logs --tail 120 app
          docker compose logs --tail 120 lan-https
          exit 1

      - name: Verify Docker Whisper runtime
        run: |
          docker compose exec -T app sh -lc 'env | grep WHISPER && test -x "$WHISPER_PYTHON_BIN" && $WHISPER_PYTHON_BIN -m whisper --help >/dev/null && echo whisper-ok'
