name: Quality Gates

on:
  push:
    branches:
      - main
      - master
      - 'codex/**'
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: daily_speaking
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d daily_speaking"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        run: npm ci

      - name: Quality gates
        run: npm run quality

      - name: Smoke API checks
        env:
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/daily_speaking
        run: npm run test:smoke
