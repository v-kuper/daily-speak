name: Quality Gates

on:
  push:
    branches:
      - main
      - master
      - 'codex/**'
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Quality gates
        run: npm run quality

      - name: Smoke API checks
        run: npm run test:smoke
